<div class="max-w-md mx-auto text-center py-12">

  <div class="card py-12">
    <div class="text-8xl mb-6">{{ emoji }}</div>
    <h1 class="font-display text-5xl text-anchor mb-2">{{ score }}/10</h1>
    <p class="text-anchor/60 font-medium text-lg mb-8">{{ message }}</p>

    <div class="flex flex-col gap-3">
      <a routerLink="/exercises" class="btn-primary flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[20px]">replay</span>
        Play Again 🚀
      </a>
      <a routerLink="/subjects" class="btn-secondary flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[20px]">menu_book</span>
        Back to Study
      </a>
    </div>
  </div>

  @if (score === 10) {
    <div class="mt-4 badge-achievement text-base inline-block">🌟 Perfect Score!</div>
  }

</div>
