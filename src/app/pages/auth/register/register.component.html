<div class="min-h-screen bg-surface flex items-center justify-center p-6"
     style="background-image: radial-gradient(circle, #2C3E50 1px, transparent 1px); background-size: 24px 24px; background-color: #FFFBF0;">

  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-[2rem] bg-secondary shadow-[0_8px_32px_rgba(78,205,196,0.35)] mb-4">
        <span class="material-symbols-outlined text-white text-4xl">how_to_reg</span>
      </div>
      <h1 class="font-display text-4xl text-anchor mb-1">Join the Quest!</h1>
      <p class="text-anchor/60 text-sm font-medium">Create your account and start learning 🌟</p>
    </div>

    <div class="relative p-[3px] rounded-[1.5rem]"
         style="background: linear-gradient(135deg, #4ECDC4, #FF6B35, #9B59B6);">
      <div class="bg-white rounded-[calc(1.5rem-3px)] p-8 shadow-[0_20px_40px_-12px_rgba(78,205,196,0.25)]"
           style="backdrop-filter: blur(8px);">

        @if (error) {
          <div class="mb-4 px-4 py-3 rounded-[1rem] bg-red-50 text-red-600 text-sm font-medium">
            {{ error }}
          </div>
        }

        <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

          <!-- School Code -->
          <div>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-anchor/40 text-[20px]">domain</span>
              <input formControlName="schoolSlug" type="text" placeholder="School code (e.g. my-school)"
                     class="input-field pl-12" autocomplete="organization" />
            </div>
            <p class="text-xs text-anchor/50 mt-1 ml-1">Ask your school administrator for the school code.</p>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-anchor/40 text-[20px]">person</span>
              <input formControlName="firstName" type="text" placeholder="First name" class="input-field pl-12" />
            </div>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-anchor/40 text-[20px]">badge</span>
              <input formControlName="lastName" type="text" placeholder="Last name" class="input-field pl-12" />
            </div>
          </div>

          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-anchor/40 text-[20px]">alternate_email</span>
            <input formControlName="email" type="email" placeholder="Email address" class="input-field pl-12" />
          </div>

          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-anchor/40 text-[20px]">lock</span>
            <input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder="Password (min 6 chars)"
                   class="input-field pl-12 pr-12" />
            <button type="button" (click)="showPassword = !showPassword"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-anchor/40 hover:text-anchor transition-colors">
              <span class="material-symbols-outlined text-[20px]">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>

          <button type="submit" [disabled]="loading"
                  class="btn-secondary w-full mt-2 flex items-center justify-center gap-2 disabled:opacity-60">
            @if (loading) {
              <span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>
            }
            Create My Account 🚀
          </button>

        </form>

        <p class="text-center text-sm text-anchor/60 mt-6">
          Already have an account?
          <a routerLink="/login" class="text-secondary font-semibold hover:underline">Log In Here</a>
        </p>

      </div>
    </div>

  </div>
</div>
